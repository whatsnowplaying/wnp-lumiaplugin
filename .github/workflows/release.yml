name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check out Lumia Plugin SDK
        uses: actions/checkout@v7
        with:
          repository: lumiastream/Plugin-SDK
          path: lumia-plugin-sdk

      - name: Install SDK CLI dependencies
        run: npm install --prefix lumia-plugin-sdk/cli

      - name: Validate plugin manifest
        run: node lumia-plugin-sdk/cli/scripts/cli.js validate .

      - name: Audit plugin hooks
        run: node lumia-plugin-sdk/scripts/plugin-audit.js .

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: tag '${GITHUB_REF_NAME}' did not produce a valid semver version ('${VERSION}')"
            exit 1
          fi
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Strip comments
        run: npx terser main.js --comments false -o main.js

      - name: Build plugin
        run: npx lumia-plugin build

      - name: Upload release artifact
        uses: softprops/action-gh-release@v3
        with:
          files: "*.lumiaplugin"
          fail_on_unmatched_files: true
