name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build plugin
        run: npx lumia-plugin build

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: "*.lumiaplugin"
          fail_on_unmatched_files: true
